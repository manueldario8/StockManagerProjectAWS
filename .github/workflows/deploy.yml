name: Deploy API

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v3

      - name: Instalar .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0

      - name: Restaurar dependencias
        run: dotnet restore ./StockManager.API/StockManager.API.slnx

      - name: Build
        run: dotnet build ./StockManager.API/StockManager.API.slnx --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ./StockManager.API/StockManager.API.csproj -c Release -o publish
        
      - name: Limpiar carpeta remota
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            rm -rf /var/www/stockmanagerapi/*
            
      - name: Copiar al servidor (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "publish/*"
          target: "/var/www/stockmanagerapi"

      - name: Reiniciar servicio
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl restart stockmanagerapi
